<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Result - IELTS THGB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 40px 20px;
        }
        
        .header {
            max-width: 800px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-link {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        
        .logo-link:hover {
            transform: translateY(-2px);
        }
        
        .logo-icon {
            font-size: 1.5rem;
        }
        
        .logo-text {
            font-size: 1.25rem;
            font-weight: 700;
            color: #2563eb;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .result-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .result-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 30px;
        }
        
        .circular-progress {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
        }
        
        .circular-progress svg {
            transform: rotate(-90deg);
        }
        
        .progress-bg {
            fill: none;
            stroke: #e5e7eb;
            stroke-width: 12;
        }
        
        .progress-bar {
            fill: none;
            stroke: #10b981;
            stroke-width: 12;
            stroke-linecap: round;
            stroke-dasharray: 565.48;
            stroke-dashoffset: 565.48;
            transition: stroke-dashoffset 2s ease-in-out;
        }
        
        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        
        .progress-label {
            font-size: 0.875rem;
            color: #6b7280;
            margin-top: -10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
        }
        
        .stat-item {
            padding: 20px;
            background: #f9fafb;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .stat-value.correct { color: #10b981; }
        .stat-value.wrong { color: #ef4444; }
        .stat-value.skipped { color: #f59e0b; }
        
        .stat-label {
            font-size: 0.875rem;
            color: #6b7280;
        }
        
        .stat-icon {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        
        .stat-icon.correct { background: #10b981; }
        .stat-icon.wrong { background: #ef4444; }
        .stat-icon.skipped { background: #f59e0b; }
        
        .detail-button {
            margin-top: 30px;
            padding: 12px 32px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .detail-button:hover {
            background: #dc2626;
        }
        
        .breakdown-section {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 2px dashed #e5e7eb;
        }
        
        .breakdown-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 20px;
            text-align: left;
        }
        
        .breakdown-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        
        .breakdown-table th {
            background: #f9fafb;
            padding: 12px;
            font-size: 0.875rem;
            font-weight: 600;
            color: #6b7280;
            border-bottom: 2px solid #e5e7eb;
        }
        
        .breakdown-table td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            font-size: 0.875rem;
        }
        
        .breakdown-table tr:hover {
            background: #f9fafb;
        }
        
        .detailed-answers {
            text-align: left;
            margin-bottom: 30px;
        }
        
        .answer-item {
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 2px solid #e5e7eb;
            background: white;
        }
        
        .answer-item.correct {
            border-color: #10b981;
            background: #f0fdf4;
        }
        
        .answer-item.wrong {
            border-color: #ef4444;
            background: #fef2f2;
        }
        
        .answer-item.skipped {
            border-color: #f59e0b;
            background: #fffbeb;
        }
        
        .answer-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .question-number-badge {
            min-width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.1rem;
        }
        
        .answer-item.correct .question-number-badge {
            background: #10b981;
            color: white;
        }
        
        .answer-item.wrong .question-number-badge {
            background: #ef4444;
            color: white;
        }
        
        .answer-item.skipped .question-number-badge {
            background: #f59e0b;
            color: white;
        }
        
        .question-text {
            flex: 1;
            font-size: 0.95rem;
            color: #1a1a1a;
            line-height: 1.5;
        }
        
        .answer-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding-left: 52px;
        }
        
        .answer-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .answer-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .answer-value {
            font-size: 0.95rem;
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 6px;
            background: white;
        }
        
        .answer-item.correct .answer-value.user {
            color: #10b981;
            border: 2px solid #10b981;
        }
        
        .answer-item.wrong .answer-value.user {
            color: #ef4444;
            border: 2px solid #ef4444;
        }
        
        .answer-item.skipped .answer-value.user {
            color: #f59e0b;
            border: 2px solid #f59e0b;
        }
        
        .answer-value.correct-answer {
            color: #10b981;
            border: 2px solid #10b981;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result-card {
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="logo-link">
            <span class="logo-icon">📚</span>
            <span class="logo-text">IELTS THGB</span>
        </a>
    </div>
    
    <div class="container">
        <div class="result-card">
            <h1 class="result-title">Kết quả làm bài</h1>
            
            <div class="circular-progress">
                <svg width="200" height="200">
                    <circle class="progress-bg" cx="100" cy="100" r="90"></circle>
                    <circle class="progress-bar" id="progressBar" cx="100" cy="100" r="90"></circle>
                </svg>
                <div class="progress-text" id="progressText">0/36</div>
            </div>
            <div class="progress-label">câu đúng</div>
            
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value correct" id="correctCount">0</div>
                    <div class="stat-label">
                        <span class="stat-icon correct"></span>
                        Đúng
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-value wrong" id="wrongCount">0</div>
                    <div class="stat-label">
                        <span class="stat-icon wrong"></span>
                        Sai
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-value skipped" id="skippedCount">0</div>
                    <div class="stat-label">
                        <span class="stat-icon skipped"></span>
                        Bỏ qua
                    </div>
                </div>
            </div>
            
            <button class="detail-button" onclick="toggleBreakdown()">Xem giải thích chi tiết</button>
            
            <div class="breakdown-section" id="breakdownSection" style="display: none;">
                <h2 class="breakdown-title">Chi tiết từng câu hỏi</h2>
                <div class="detailed-answers" id="detailedAnswers"></div>
                
                <h2 class="breakdown-title" style="margin-top: 40px;">Bảng thống kê theo loại câu hỏi</h2>
                <table class="breakdown-table">
                    <thead>
                        <tr>
                            <th>Loại câu hỏi</th>
                            <th>Số câu hỏi</th>
                            <th>Đúng</th>
                            <th>Sai</th>
                            <th>Bỏ qua</th>
                        </tr>
                    </thead>
                    <tbody id="breakdownBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        // Get results from localStorage or use demo data
        const results = JSON.parse(localStorage.getItem('testResults')) || {
            correct: 13,
            wrong: 10,
            skipped: 13,
            total: 36,
            breakdown: [
                { type: 'TRUE/FALSE/NOT GIVEN', total: 5, correct: 3, wrong: 1, skipped: 1 },
                { type: 'Gap Filling', total: 8, correct: 5, wrong: 2, skipped: 1 },
                { type: 'Multiple Choice (Table)', total: 5, correct: 2, wrong: 3, skipped: 0 },
                { type: 'Matching', total: 5, correct: 1, wrong: 2, skipped: 2 },
                { type: 'Summary Completion', total: 5, correct: 1, wrong: 1, skipped: 3 },
                { type: 'Multiple Choice', total: 5, correct: 1, wrong: 1, skipped: 3 }
            ]
        };
        
        // Animate numbers
        function animateNumber(element, target, duration = 1500) {
            const start = 0;
            const increment = target / (duration / 16);
            let current = start;
            
            const timer = setInterval(() => {
                current += increment;
                if (current >= target) {
                    current = target;
                    clearInterval(timer);
                }
                element.textContent = Math.floor(current);
            }, 16);
        }
        
        // Animate circular progress
        function animateProgress(percentage, duration = 2000) {
            const progressBar = document.getElementById('progressBar');
            const circumference = 2 * Math.PI * 90; // 565.48
            const offset = circumference - (percentage / 100) * circumference;
            
            setTimeout(() => {
                progressBar.style.strokeDashoffset = offset;
            }, 100);
        }
        
        // Initialize
        window.addEventListener('load', () => {
            const percentage = (results.correct / results.total) * 100;
            
            // Animate progress bar
            animateProgress(percentage);
            
            // Animate numbers
            document.getElementById('progressText').textContent = `${results.correct}/${results.total}`;
            animateNumber(document.getElementById('correctCount'), results.correct);
            animateNumber(document.getElementById('wrongCount'), results.wrong);
            animateNumber(document.getElementById('skippedCount'), results.skipped);
            
            // Populate detailed answers
            if (results.detailedAnswers) {
                const detailedAnswersDiv = document.getElementById('detailedAnswers');
                results.detailedAnswers.forEach(answer => {
                    const statusClass = answer.isSkipped ? 'skipped' : (answer.isCorrect ? 'correct' : 'wrong');
                    
                    const answerItem = document.createElement('div');
                    answerItem.className = `answer-item ${statusClass}`;
                    answerItem.innerHTML = `
                        <div class="answer-header">
                            <div class="question-number-badge">${answer.questionId}</div>
                            <div class="question-text">${answer.questionText}</div>
                        </div>
                        <div class="answer-details">
                            <div class="answer-row">
                                <div class="answer-label">Câu trả lời của bạn</div>
                                <div class="answer-value user">${answer.userAnswer}</div>
                            </div>
                            <div class="answer-row">
                                <div class="answer-label">Đáp án đúng</div>
                                <div class="answer-value correct-answer">${answer.correctAnswer}</div>
                            </div>
                        </div>
                    `;
                    detailedAnswersDiv.appendChild(answerItem);
                });
            }
            
            // Populate breakdown table
            const breakdownBody = document.getElementById('breakdownBody');
            results.breakdown.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.type}</td>
                    <td>${item.total}</td>
                    <td style="color: #10b981; font-weight: 600;">${item.correct}</td>
                    <td style="color: #ef4444; font-weight: 600;">${item.wrong}</td>
                    <td style="color: #f59e0b; font-weight: 600;">${item.skipped}</td>
                `;
                breakdownBody.appendChild(row);
            });
        });
        
        function toggleBreakdown() {
            const section = document.getElementById('breakdownSection');
            section.style.display = section.style.display === 'none' ? 'block' : 'none';
        }
    </script>
</body>
</html>
